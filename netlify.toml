[build]
  command = "curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --version 8.0.418 && export PATH=\"$HOME/.dotnet:$PATH\" && dotnet publish -c Release -o output"
  publish = "output/wwwroot"

[build.environment]
  DOTNET_VERSION = "8.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
